<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BUFF163 Exporter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 380px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #0f1117; color: #e0e0e0; }

    header { background: #1a1d27; padding: 14px 16px; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 15px; font-weight: 600; color: #fff; }
    header .tag { background: #f5a623; color: #000; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }

    .section { padding: 12px 16px; border-bottom: 1px solid #1e2130; }

    #status-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; }
    .dot.green { background: #4caf50; box-shadow: 0 0 4px #4caf50; }
    .dot.red   { background: #f44336; }
    .dot.yellow{ background: #ffc107; }

    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
    .stat { background: #1a1d27; border-radius: 6px; padding: 8px 10px; text-align: center; }
    .stat .val { font-size: 18px; font-weight: 700; color: #f5a623; }
    .stat .lbl { font-size: 10px; color: #888; margin-top: 2px; }

    .progress-wrap { margin-top: 10px; }
    .progress-bar-bg { background: #1e2130; border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #f5a623, #ff7043); width: 0%; transition: width .3s; border-radius: 4px; }
    .progress-label { font-size: 11px; color: #888; margin-top: 4px; text-align: right; }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 0; }
    .btn { flex: 1; min-width: 80px; padding: 8px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: opacity .15s, transform .1s; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: .85; }
    .btn:not(:disabled):active { transform: scale(.97); }
    .btn-primary   { background: #f5a623; color: #000; }
    .btn-secondary { background: #2a2d3a; color: #e0e0e0; }
    .btn-green     { background: #4caf50; color: #fff; }
    .btn-blue      { background: #2196f3; color: #fff; }

    #log { background: #0a0c12; border-radius: 6px; padding: 8px; font-family: 'Courier New', monospace; font-size: 11px; height: 110px; overflow-y: auto; color: #9e9e9e; margin-top: 10px; }
    #log .err  { color: #f44336; }
    #log .ok   { color: #4caf50; }
    #log .info { color: #90caf9; }

    .resume-note { font-size: 11px; color: #888; margin-top: 6px; }
    .resume-note b { color: #f5a623; }
  </style>
</head>
<body>

<header>
  <h1>BUFF163 Exporter</h1>
  <span class="tag">BUY HISTORY</span>
  <button onclick="chrome.tabs.create({url: chrome.runtime.getURL('popup.html')})" title="Open as full tab" style="margin-left:auto;background:none;border:1px solid #3a3d4a;color:#888;border-radius:4px;padding:2px 7px;cursor:pointer;font-size:11px;">↗ Tab</button>
</header>

<div class="section">
  <div id="status-badge"><span class="dot" id="dot"></span><span id="status-text">Not connected — open buff.163.com first</span></div>
  <div class="stats">
    <div class="stat"><div class="val" id="stat-fetched">0</div><div class="lbl">Fetched</div></div>
    <div class="stat"><div class="val" id="stat-total">—</div><div class="lbl">Total</div></div>
    <div class="stat"><div class="val" id="stat-page">—</div><div class="lbl">Page</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <div class="progress-label" id="progress-label">—</div>
  </div>
</div>

<div class="section">
  <div class="btn-row">
    <button class="btn btn-secondary" id="btn-validate">✓ Validate</button>
    <button class="btn btn-primary"   id="btn-fetch"       disabled>⬇ Fetch All</button>
    <button class="btn btn-green"     id="btn-fetch-today" disabled>⬇ Today</button>
    <button class="btn btn-green"     id="btn-fetch-week"  disabled>⬇ Week</button>
    <button class="btn btn-green"     id="btn-fetch-month" disabled>⬇ Month</button>
    <button class="btn btn-secondary" id="btn-stop"        disabled>■ Stop</button>
  </div>
  <div class="btn-row" style="margin-top:8px; align-items:center; gap:6px;">
    <input type="date" id="date-from" style="flex:1;padding:6px 8px;background:#1a1d27;border:1px solid #2a2d3a;border-radius:5px;color:#e0e0e0;font-size:12px;">
    <span style="color:#888;font-size:11px;">→</span>
    <input type="date" id="date-to"   style="flex:1;padding:6px 8px;background:#1a1d27;border:1px solid #2a2d3a;border-radius:5px;color:#e0e0e0;font-size:12px;">
    <button class="btn btn-primary" id="btn-fetch-range" disabled style="flex:none;padding:6px 10px;">⬇ Range</button>
  </div>
  </div>
  <div class="btn-row" style="margin-top:8px">
    <button class="btn btn-green" id="btn-csv"   disabled>↓ CSV</button>
    <button class="btn btn-blue"  id="btn-xlsx"  disabled>↓ Excel</button>
    <button class="btn btn-secondary" id="btn-debug" disabled>⚙ Raw JSON</button>
  </div>
  <div class="btn-row" style="margin-top:8px">
    <button class="btn btn-secondary" id="btn-tracker-csv"  disabled>↓ Tracker CSV</button>
    <button class="btn btn-secondary" id="btn-tracker-copy" disabled>⧉ Copy to Clipboard</button>
  </div>
  <div class="btn-row" style="margin-top:8px">
    <button class="btn btn-green" id="btn-sync-today"  disabled>⇪ Sync Today</button>
    <button class="btn btn-green" id="btn-sync-week"   disabled>⇪ Sync Week</button>
    <button class="btn btn-green" id="btn-sync-month"  disabled>⇪ Sync Month</button>
  </div>
  <div class="resume-note" id="resume-note" style="display:none">
    ⚡ Checkpoint found: <b id="resume-count">0</b> orders saved. Resume or start fresh.
    <button class="btn btn-secondary" style="margin-top:4px;flex:none;width:100%" id="btn-clear-checkpoint">Clear checkpoint</button>
  </div>
  <div id="log"></div>
</div>

<script src="lib/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="popup.js"></script>
</body>
</html>
